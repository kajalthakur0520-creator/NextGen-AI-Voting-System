<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Sign In | NexGen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; background-color: #0f172a; color: #f8fafc; }
        .bg-gif-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: url('https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExZWZkam8wcnFjN2c1Mmk0eDR1bzE3dHh6bHg3Z3llZ3NpNmZxdDJoNyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/YqhIK6Gbor6CLeloBq/giphy.gif') no-repeat center center fixed; background-size: cover; z-index: -3; opacity: 0.6; filter: saturate(1.5) contrast(1.2); }
        .bg-gradient-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(-45deg, rgba(236, 72, 153, 0.5), rgba(139, 92, 246, 0.4), rgba(56, 189, 248, 0.4), rgba(52, 211, 153, 0.4)); background-size: 400% 400%; animation: moveGradient 15s ease infinite; z-index: -2; mix-blend-mode: overlay; }
        @keyframes moveGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .dark-dim-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.7); z-index: -1; }
        h1, h2, h3, h4, th, .heading-font { font-family: 'Poppins', sans-serif; }
        .glass-card { background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%); backdrop-filter: blur(28px); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), inset 0 0 1px rgba(255, 255, 255, 0.3); border-top: 1px solid rgba(255, 255, 255, 0.4); border-left: 1px solid rgba(255, 255, 255, 0.3); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        .glass-card:hover { transform: translateY(-8px); box-shadow: 0 35px 60px rgba(0, 0, 0, 0.5), inset 0 0 2px rgba(255, 255, 255, 0.4), 0 0 40px rgba(139, 92, 246, 0.3); border-color: rgba(236, 72, 153, 0.3); }
        .gradient-text { background: linear-gradient(135deg, #00f2fe 0%, #4facfe 30%, #f093fb 70%, #f5576c 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% auto; animation: shineText 4s linear infinite; }
        @keyframes shineText { to { background-position: 200% center; } }
        .btn-elegant { background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%); border: none; position: relative; z-index: 1; overflow: hidden; transition: all 0.4s ease; box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); }
        .btn-elegant::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%); z-index: -1; transition: opacity 0.4s ease; opacity: 0; }
        .btn-elegant:hover::before { opacity: 1; }
        .btn-elegant:hover { box-shadow: 0 0 25px rgba(240, 147, 251, 0.7); transform: translateY(-3px) scale(1.02); }
        .glass-input { background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s ease; }
        .glass-input:focus { outline: none; border-color: rgba(240, 147, 251, 0.8); background: rgba(15, 23, 42, 0.7); box-shadow: 0 0 20px rgba(240, 147, 251, 0.4); transform: scale(1.01); }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body class="relative min-h-screen flex items-center justify-center p-4">

    <div class="bg-gif-layer"></div>
    <div class="bg-gradient-layer"></div>
    <div class="dark-dim-layer"></div>

    <div class="absolute top-6 left-6 z-10 flex text-center">
        <a href="/" class="text-sm font-medium text-amber-300 hover:text-white transition-colors flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Home
        </a>
    </div>

    <!-- Login Box -->
    <div class="glass-card p-10 md:p-12 rounded-3xl w-full max-w-md text-center relative z-10">
        
        <div class="inline-flex justify-center items-center w-16 h-16 rounded-2xl bg-white/5 border border-white/10 mb-6 shadow-xl relative group">
             <div class="absolute inset-0 bg-amber-500 rounded-2xl blur-xl opacity-30 group-hover:opacity-50 transition-opacity"></div>
             <svg class="w-8 h-8 text-amber-300 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
        </div>

        <h2 class="text-3xl font-bold gradient-text mb-3">Candidate Portal</h2>
        <p class="text-gray-400 text-sm font-light mb-10">Sign in to manage your campaign profile.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="bg-red-500/10 border border-red-500/20 text-red-300 p-4 rounded-xl mb-8 text-sm flex items-center gap-3">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('candidate_bp.login') }}" method="POST" class="space-y-6 text-left">
            <div>
                <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2 ml-1">Email Address</label>
                <input type="email" name="email" required class="w-full px-5 py-4 rounded-xl glass-input text-base text-center">
            </div>
            
            <div>
                <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2 ml-1">Password</label>
                <input type="password" name="password" required class="w-full px-5 py-4 rounded-xl glass-input text-base text-center" style="-webkit-text-security: disc;">
            </div>

            <button type="submit" class="btn-elegant w-full text-white py-4 rounded-xl font-medium text-base transition-all mt-8 flex items-center justify-center gap-2">
                Log In
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>

        <p class="text-gray-400 text-center mt-8 text-sm">
            Want to run for office? <a href="{{ url_for('candidate_bp.register') }}" class="text-amber-300 font-medium hover:text-white transition-colors">Apply here</a>
        </p>
    </div>
</body>
</html>
