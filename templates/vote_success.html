<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote Receipt | NexGen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-color: #0f172a;
            color: #f8fafc;
        }
        
        .bg-gif-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExZWZkam8wcnFjN2c1Mmk0eDR1bzE3dHh6bHg3Z3llZ3NpNmZxdDJoNyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/YqhIK6Gbor6CLeloBq/giphy.gif') no-repeat center center fixed;
            background-size: cover;
            z-index: -3;
            opacity: 0.6;
            filter: saturate(1.5) contrast(1.2);
        }

        .bg-gradient-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                -45deg, 
                rgba(236, 72, 153, 0.5), /* Pink */
                rgba(139, 92, 246, 0.4), /* Violet */
                rgba(56, 189, 248, 0.4), /* Cyan */
                rgba(52, 211, 153, 0.4)  /* Emerald */
            );
            background-size: 400% 400%;
            animation: moveGradient 15s ease infinite;
            z-index: -2;
            mix-blend-mode: overlay;
        }
        
        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .dark-dim-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.7);
            z-index: -1;
        }

        h1, h2, h3, h4, th, .heading-font {
            font-family: 'Poppins', sans-serif;
        }
        
        .glass-nav {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), inset 0 0 1px rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-20deg);
            transition: all 0.7s ease;
        }
        
        .glass-card:hover::before {
            left: 200%;
        }

        .glass-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.5), inset 0 0 2px rgba(255, 255, 255, 0.4), 0 0 40px rgba(139, 92, 246, 0.3);
            border-color: rgba(236, 72, 153, 0.3);
        }

        .gradient-text {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 30%, #f093fb 70%, #f5576c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shineText 4s linear infinite;
        }
        
        @keyframes shineText {
            to { background-position: 200% center; }
        }

        .btn-elegant {
            background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            position: relative;
            z-index: 1;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
        
        .btn-elegant::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            z-index: -1;
            transition: opacity 0.4s ease;
            opacity: 0;
        }
        
        .btn-elegant:hover::before {
            opacity: 1;
        }
        
        .btn-elegant:hover {
            box-shadow: 0 0 25px rgba(240, 147, 251, 0.7);
            transform: translateY(-3px) scale(1.02);
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body class="relative min-h-screen flex items-center justify-center p-4">

    <!-- Background Animation Elements -->
    <div class="bg-gif-layer"></div>
    <div class="bg-gradient-layer"></div>
    <div class="dark-dim-layer"></div>

    <!-- Main Container -->
    <div class="glass-card p-10 md:p-14 rounded-3xl w-full max-w-2xl text-center relative z-10">
        
        <div class="inline-flex justify-center items-center w-20 h-20 rounded-full bg-emerald-500/20 border border-emerald-500/40 mb-8 shadow-[0_0_30px_rgba(16,185,129,0.3)] animate-pulse">
            <svg class="w-10 h-10 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>

        <h2 class="text-3xl md:text-4xl font-bold text-white heading-font mb-4">
            Ballot Cast Successfully
        </h2>
        <p class="text-gray-300 text-sm md:text-base font-light mb-10 leading-relaxed">
            Your vote has been cryptographically sealed and recorded on the immutable ledger. Below is your official Vote Receipt Hash. Keep this safe to independently verify your participation.
        </p>

        <!-- Hash Display Box -->
        <div class="bg-black/40 border border-white/10 rounded-2xl p-6 mb-10 relative group">
            <p class="text-xs text-emerald-400 font-semibold uppercase tracking-widest mb-3 flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                SHA-256 Receipt Hash
            </p>
            <p class="text-gray-200 font-mono text-xs md:text-sm break-all leading-relaxed bg-white/5 p-4 rounded-xl border border-white/5 group-hover:border-indigo-500/50 transition-colors cursor-text select-all">
                {{ receipt_hash }}
            </p>
            <div class="absolute inset-x-0 bottom-0 h-0.5 bg-gradient-to-r from-emerald-400 to-indigo-500 transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left rounded-b-2xl duration-500"></div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <button onclick="window.print()" class="bg-white/10 hover:bg-white/20 border border-white/20 text-white py-4 px-8 rounded-xl font-medium transition-all flex items-center justify-center gap-2 shadow-lg w-full sm:w-auto">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                Print / Save PDF
            </button>
            <a href="{{ url_for('voter_bp.dashboard') }}" class="btn-elegant text-white py-4 px-8 rounded-xl font-medium transition-all flex items-center justify-center gap-2 shadow-lg w-full sm:w-auto">
                Return to Dashboard
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </a>
        </div>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
</body>
</html>
