<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Verify OTP | NexGen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .bg-gif-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: url('https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExZWZkam8wcnFjN2c1Mmk0eDR1bzE3dHh6bHg3Z3llZ3NpNmZxdDJoNyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/YqhIK6Gbor6CLeloBq/giphy.gif') no-repeat center center fixed; background-size: cover; z-index: -3; opacity: 0.6; }
        .bg-gradient-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(-45deg, rgba(236, 72, 153, 0.5), rgba(139, 92, 246, 0.4), rgba(56, 189, 248, 0.4), rgba(52, 211, 153, 0.4)); background-size: 400% 400%; animation: moveGradient 15s ease infinite; z-index: -2; mix-blend-mode: overlay; }
        @keyframes moveGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-card { background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%); backdrop-filter: blur(28px); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4); border-top: 1px solid rgba(255, 255, 255, 0.4); border-left: 1px solid rgba(255, 255, 255, 0.3); }
        .gradient-text { background: linear-gradient(135deg, #00f2fe 0%, #4facfe 30%, #f093fb 70%, #f5576c 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-input { background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s ease; }
        .glass-input:focus { outline: none; border-color: rgba(240, 147, 251, 0.8); background: rgba(15, 23, 42, 0.7); box-shadow: 0 0 20px rgba(240, 147, 251, 0.4); }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body class="relative min-h-screen flex items-center justify-center p-4">
    <div class="bg-gif-layer"></div>
    <div class="bg-gradient-layer"></div>
    <div class="absolute inset-0 bg-slate-900/70 z-[-1]"></div>

    <div class="glass-card p-10 md:p-12 rounded-3xl w-full max-w-md text-center relative z-10">
        <h2 class="text-3xl font-bold gradient-text mb-3">2-Step Verification</h2>
        <p class="text-gray-400 text-sm font-light mb-10">Enter the OTP sent to the admin system.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="bg-indigo-500/20 border border-indigo-500/40 text-indigo-200 p-4 rounded-xl mb-8 text-sm">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin_bp.verify_otp') }}" method="POST" class="space-y-6">
            <input type="text" name="otp" required placeholder="Enter 6-digit OTP" class="w-full px-5 py-4 rounded-xl glass-input text-xl text-center tracking-widest font-mono">
            
            <button type="submit" class="w-full bg-gradient-to-r from-cyan-400 to-blue-500 text-white py-4 rounded-xl font-medium text-base transition-all hover:shadow-lg hover:shadow-cyan-500/30">
                Verify Admin Identity
            </button>
        </form>
    </div>
</body>
</html>
