<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Candidate | NexGen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-color: #0f172a;
            color: #f8fafc;
        }
        
        .bg-gif-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExZWZkam8wcnFjN2c1Mmk0eDR1bzE3dHh6bHg3Z3llZ3NpNmZxdDJoNyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/YqhIK6Gbor6CLeloBq/giphy.gif') no-repeat center center fixed;
            background-size: cover;
            z-index: -3;
            opacity: 0.6;
            filter: saturate(1.5) contrast(1.2);
        }

        .bg-gradient-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                -45deg, 
                rgba(236, 72, 153, 0.5), /* Pink */
                rgba(139, 92, 246, 0.4), /* Violet */
                rgba(56, 189, 248, 0.4), /* Cyan */
                rgba(52, 211, 153, 0.4)  /* Emerald */
            );
            background-size: 400% 400%;
            animation: moveGradient 15s ease infinite;
            z-index: -2;
            mix-blend-mode: overlay;
        }
        
        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .dark-dim-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.7);
            z-index: -1;
        }

        h1, h2, h3, h4, th, .heading-font {
            font-family: 'Poppins', sans-serif;
        }
        
        .glass-nav {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), inset 0 0 1px rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-20deg);
            transition: all 0.7s ease;
        }
        
        .glass-card:hover::before {
            left: 200%;
        }

        .glass-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.5), inset 0 0 2px rgba(255, 255, 255, 0.4), 0 0 40px rgba(139, 92, 246, 0.3);
            border-color: rgba(236, 72, 153, 0.3);
        }

        .gradient-text {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 30%, #f093fb 70%, #f5576c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shineText 4s linear infinite;
        }
        
        @keyframes shineText {
            to { background-position: 200% center; }
        }
        
        .floating-element {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .btn-elegant {
            background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            position: relative;
            z-index: 1;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
        
        .btn-elegant::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            z-index: -1;
            transition: opacity 0.4s ease;
            opacity: 0;
        }
        
        .btn-elegant:hover::before {
            opacity: 1;
        }
        
        .btn-elegant:hover {
            box-shadow: 0 0 25px rgba(240, 147, 251, 0.7);
            transform: translateY(-3px) scale(1.02);
        }
        
        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }
        
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(236, 72, 153, 0.6);
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.4);
            transform: translateY(-3px);
        }
        
        .glass-input {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        
        .glass-input:focus {
            outline: none;
            border-color: rgba(240, 147, 251, 0.8);
            background: rgba(15, 23, 42, 0.7);
            box-shadow: 0 0 20px rgba(240, 147, 251, 0.4);
            transform: scale(1.01);
        }
        
        .pulse-border {
            animation: borderPulse 3s infinite;
        }
        
        @keyframes borderPulse {
            0% { border-color: rgba(255,255,255,0.1); }
            50% { border-color: rgba(240, 147, 251, 0.6); box-shadow: 0 0 20px rgba(240, 147, 251, 0.3); }
            100% { border-color: rgba(255,255,255,0.1); }
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body class="relative min-h-screen flex items-center justify-center p-4">

    <!-- Background Animation Elements -->
    <div class="bg-gif-layer"></div>
    <div class="bg-gradient-layer"></div>
    <div class="dark-dim-layer"></div>

    <div class="absolute top-6 left-6 z-10 hidden md:flex">
        <a href="{{ url_for('admin_bp.dashboard') }}" class="text-sm font-medium text-indigo-300 hover:text-white transition-colors flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Dashboard
        </a>
    </div>

    <!-- Main Container -->
    <div class="glass-card p-10 md:p-14 rounded-3xl w-full max-w-lg text-center relative z-10 transition-all">
        <div class="inline-flex justify-center items-center w-16 h-16 rounded-2xl bg-white/5 border border-white/10 mb-8 shadow-xl relative group">
            <div class="absolute inset-0 bg-indigo-500 blur-xl opacity-20 group-hover:opacity-40 transition-opacity"></div>
            <svg class="w-8 h-8 text-indigo-300 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
        </div>

        <h2 class="text-3xl font-bold gradient-text mb-3">
            Add Candidate
        </h2>
        <p class="text-gray-400 text-sm font-light mb-10 truncate capitalize">Election ID: {{ election_id }}</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="bg-indigo-500/10 border border-indigo-500/20 text-indigo-200 p-4 rounded-xl mb-8 text-sm flex items-center gap-3">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="flex justify-center mb-6 bg-black/20 p-1 rounded-xl">
            <button id="btn-existing" type="button" class="flex-1 py-2 rounded-lg text-sm font-medium transition-all bg-indigo-500 text-white" onclick="toggleCandidateType('existing')">From Verified Candidates</button>
            <button id="btn-custom" type="button" class="flex-1 py-2 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white" onclick="toggleCandidateType('custom')">Create New</button>
        </div>

        <form action="{{ url_for('admin_bp.add_candidate', election_id=election_id) }}" method="POST" enctype="multipart/form-data" class="space-y-6 text-left" id="candidateForm">
            <input type="hidden" name="candidate_type" id="candidate_type" value="existing">

            <div id="section-existing" class="space-y-6">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">Select Candidate</label>
                    <select name="existing_candidate_id" class="w-full px-5 py-4 rounded-xl glass-input text-sm text-gray-400">
                        <option value="" disabled selected>-- Choose a Verified Candidate --</option>
                        {% for cand in verified_candidates %}
                            <option value="{{ cand._id }}">{{ cand.name }} ({{ cand.party }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div id="section-custom" class="space-y-6 hidden">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">Candidate Name</label>
                    <input type="text" name="name" id="custom-name" placeholder="John Doe" class="w-full px-5 py-4 rounded-xl glass-input text-sm">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">Political Party</label>
                    <input type="text" name="party" id="custom-party" placeholder="Liberty Alliance" class="w-full px-5 py-4 rounded-xl glass-input text-sm">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">Party Logo (Optional)</label>
                    <input type="file" name="logo" accept="image/*" class="w-full px-5 py-4 rounded-xl glass-input text-sm text-gray-400">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">Candidate Manifesto / Description</label>
                    <textarea name="description" id="custom-desc" placeholder="Enter the candidate's agenda, experience, and key campaign promises..." rows="4" class="w-full px-5 py-4 rounded-xl glass-input text-sm resize-none"></textarea>
                </div>
            </div>

            <button type="submit" class="btn-elegant w-full text-white py-4 rounded-xl font-medium text-base transition-all mt-8 flex items-center justify-center gap-2">
                Register Candidate
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>
        </form>
        
        <script>
            function toggleCandidateType(type) {
                document.getElementById('candidate_type').value = type;
                if (type === 'existing') {
                    document.getElementById('section-existing').classList.remove('hidden');
                    document.getElementById('section-custom').classList.add('hidden');
                    
                    document.getElementById('btn-existing').classList.add('bg-indigo-500', 'text-white');
                    document.getElementById('btn-existing').classList.remove('text-gray-400', 'hover:text-white');
                    
                    document.getElementById('btn-custom').classList.remove('bg-indigo-500', 'text-white');
                    document.getElementById('btn-custom').classList.add('text-gray-400', 'hover:text-white');

                    document.getElementById('custom-name').required = false;
                    document.getElementById('custom-party').required = false;
                    document.getElementById('custom-desc').required = false;
                } else {
                    document.getElementById('section-existing').classList.add('hidden');
                    document.getElementById('section-custom').classList.remove('hidden');
                    
                    document.getElementById('btn-custom').classList.add('bg-indigo-500', 'text-white');
                    document.getElementById('btn-custom').classList.remove('text-gray-400', 'hover:text-white');
                    
                    document.getElementById('btn-existing').classList.remove('bg-indigo-500', 'text-white');
                    document.getElementById('btn-existing').classList.add('text-gray-400', 'hover:text-white');

                    document.getElementById('custom-name').required = true;
                    document.getElementById('custom-party').required = true;
                    document.getElementById('custom-desc').required = true;
                }
            }
            
            window.onload = function() {
                toggleCandidateType('existing');
            };
        </script>
        
        <div class="mt-8 text-center visible md:hidden">
             <a href="{{ url_for('admin_bp.dashboard') }}" class="text-sm font-medium text-indigo-300 hover:text-white transition-colors">Return to Dashboard</a>
        </div>
    </div>

</body>
</html>
