<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Election | NexGen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-color: #0f172a;
            color: #f8fafc;
        }
        
        .bg-gif-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExZWZkam8wcnFjN2c1Mmk0eDR1bzE3dHh6bHg3Z3llZ3NpNmZxdDJoNyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/YqhIK6Gbor6CLeloBq/giphy.gif') no-repeat center center fixed;
            background-size: cover;
            z-index: -3;
            opacity: 0.6;
            filter: saturate(1.5) contrast(1.2);
        }

        .bg-gradient-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                -45deg, 
                rgba(236, 72, 153, 0.5), /* Pink */
                rgba(139, 92, 246, 0.4), /* Violet */
                rgba(56, 189, 248, 0.4), /* Cyan */
                rgba(52, 211, 153, 0.4)  /* Emerald */
            );
            background-size: 400% 400%;
            animation: moveGradient 15s ease infinite;
            z-index: -2;
            mix-blend-mode: overlay;
        }
        
        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .dark-dim-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.7);
            z-index: -1;
        }

        h1, h2, h3, h4, th, .heading-font {
            font-family: 'Poppins', sans-serif;
        }
        
        .glass-nav {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), inset 0 0 1px rgba(255, 255, 255, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-20deg);
            transition: all 0.7s ease;
        }
        
        .glass-card:hover::before {
            left: 200%;
        }

        .glass-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.5), inset 0 0 2px rgba(255, 255, 255, 0.4), 0 0 40px rgba(139, 92, 246, 0.3);
            border-color: rgba(236, 72, 153, 0.3);
        }

        .gradient-text {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 30%, #f093fb 70%, #f5576c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shineText 4s linear infinite;
        }
        
        @keyframes shineText {
            to { background-position: 200% center; }
        }
        
        .floating-element {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .btn-elegant {
            background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            position: relative;
            z-index: 1;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
        
        .btn-elegant::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            z-index: -1;
            transition: opacity 0.4s ease;
            opacity: 0;
        }
        
        .btn-elegant:hover::before {
            opacity: 1;
        }
        
        .btn-elegant:hover {
            box-shadow: 0 0 25px rgba(240, 147, 251, 0.7);
            transform: translateY(-3px) scale(1.02);
        }
        
        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }
        
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(236, 72, 153, 0.6);
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.4);
            transform: translateY(-3px);
        }
        
        .glass-input {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        
        .glass-input:focus {
            outline: none;
            border-color: rgba(240, 147, 251, 0.8);
            background: rgba(15, 23, 42, 0.7);
            box-shadow: 0 0 20px rgba(240, 147, 251, 0.4);
            transform: scale(1.01);
        }
        
        .pulse-border {
            animation: borderPulse 3s infinite;
        }
        
        @keyframes borderPulse {
            0% { border-color: rgba(255,255,255,0.1); }
            50% { border-color: rgba(240, 147, 251, 0.6); box-shadow: 0 0 20px rgba(240, 147, 251, 0.3); }
            100% { border-color: rgba(255,255,255,0.1); }
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body class="relative min-h-screen flex items-center justify-center p-4">

    <!-- Background Animation Elements -->
    <div class="bg-gif-layer"></div>
    <div class="bg-gradient-layer"></div>
    <div class="dark-dim-layer"></div>

    <div class="absolute top-6 left-6 z-10 hidden md:flex">
        <a href="{{ url_for('admin_bp.dashboard') }}" class="text-sm font-medium text-emerald-300 hover:text-white transition-colors flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Dashboard
        </a>
    </div>

    <!-- Main Container -->
    <div class="glass-card p-10 md:p-14 rounded-3xl w-full max-w-xl text-center relative z-10 transition-all">
        <div class="inline-flex justify-center items-center w-16 h-16 rounded-2xl bg-white/5 border border-white/10 mb-8 shadow-xl relative group">
            <div class="absolute inset-0 bg-emerald-500 blur-xl opacity-30 group-hover:opacity-50 transition-opacity"></div>
            <svg class="w-8 h-8 text-emerald-300 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"></path></svg>
        </div>

        <h2 class="text-3xl font-bold gradient-text mb-3">
            Initialize Election
        </h2>
        <p class="text-gray-400 text-sm font-light mb-10">Configure a new voting protocol for a specific region.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="bg-red-500/10 border border-red-500/20 text-red-300 p-4 rounded-xl mb-8 text-sm flex items-center gap-3">
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin_bp.create_election') }}" method="POST" class="space-y-6 text-left">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">Election Name</label>
                <input type="text" name="name" placeholder="E.g., General Assembly 2026" required class="w-full px-5 py-4 rounded-xl glass-input text-sm">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">Election Category</label>
                <select name="election_type" required class="w-full px-5 py-4 rounded-xl glass-input text-sm text-gray-300">
                    <option value="" disabled selected>Select Election Type</option>
                    <option value="General Election (Lok Sabha)">1. General Election (Lok Sabha) 🏛️</option>
                    <option value="State Legislative Assembly (Vidhan Sabha)">2. State Legislative Assembly 🏢</option>
                    <option value="Local Body Election">3. Local Body Election 🏙️</option>
                    <option value="Presidential Election">4. Presidential Election 🇮🇳</option>
                    <option value="Vice-Presidential Election">5. Vice-Presidential Election</option>
                    <option value="Rajya Sabha Election">6. Rajya Sabha Election 🏛️</option>
                    <option value="Legislative Council (Vidhan Parishad)">7. Legislative Council Election</option>
                    <option value="By-Election">8. By-Election (Bye-Election) 🔁</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">Geographic Region</label>
                <select name="region" required class="w-full px-5 py-4 rounded-xl glass-input text-sm text-gray-300">
                    <option value="" disabled selected>Select Region</option>
                    <optgroup label="States">
                        <option value="Andhra Pradesh">Andhra Pradesh</option>
                        <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                        <option value="Assam">Assam</option>
                        <option value="Bihar">Bihar</option>
                        <option value="Chhattisgarh">Chhattisgarh</option>
                        <option value="Goa">Goa</option>
                        <option value="Gujarat">Gujarat</option>
                        <option value="Haryana">Haryana</option>
                        <option value="Himachal Pradesh">Himachal Pradesh</option>
                        <option value="Jharkhand">Jharkhand</option>
                        <option value="Karnataka">Karnataka</option>
                        <option value="Kerala">Kerala</option>
                        <option value="Madhya Pradesh">Madhya Pradesh</option>
                        <option value="Maharashtra">Maharashtra</option>
                        <option value="Manipur">Manipur</option>
                        <option value="Meghalaya">Meghalaya</option>
                        <option value="Mizoram">Mizoram</option>
                        <option value="Nagaland">Nagaland</option>
                        <option value="Odisha">Odisha</option>
                        <option value="Punjab">Punjab</option>
                        <option value="Rajasthan">Rajasthan</option>
                        <option value="Sikkim">Sikkim</option>
                        <option value="Tamil Nadu">Tamil Nadu</option>
                        <option value="Telangana">Telangana</option>
                        <option value="Tripura">Tripura</option>
                        <option value="Uttar Pradesh">Uttar Pradesh</option>
                        <option value="Uttarakhand">Uttarakhand</option>
                        <option value="West Bengal">West Bengal</option>
                    </optgroup>
                    <optgroup label="Union Territories">
                        <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
                        <option value="Chandigarh">Chandigarh</option>
                        <option value="Dadra and Nagar Haveli and Daman and Diu">Dadra and Nagar Haveli and Daman and Diu</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Jammu and Kashmir">Jammu and Kashmir</option>
                        <option value="Lakshadweep">Lakshadweep</option>
                        <option value="Ladakh">Ladakh</option>
                        <option value="Puducherry">Puducherry</option>
                    </optgroup>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">Start Time</label>
                    <input type="datetime-local" name="start_time" required class="w-full px-5 py-4 rounded-xl glass-input text-sm text-gray-300" style="color-scheme: dark;">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">End Time</label>
                    <input type="datetime-local" name="end_time" required class="w-full px-5 py-4 rounded-xl glass-input text-sm text-gray-300" style="color-scheme: dark;">
                </div>
            </div>

            <button type="submit" class="btn-elegant w-full text-white py-4 rounded-xl font-medium text-base transition-all mt-6 flex items-center justify-center gap-2">
                Deploy Election
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </button>
        </form>
        
        <div class="mt-8 text-center visible md:hidden">
             <a href="{{ url_for('admin_bp.dashboard') }}" class="text-sm font-medium text-emerald-300 hover:text-white transition-colors">Abort and Return to Dashboard</a>
        </div>
    </div>

</body>
</html>
